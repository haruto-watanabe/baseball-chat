<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>野球談義 - ライブチャット</title>
    <style>
        /* --- 基本スタイル（YouTubeダークモード風） --- */
        body {
            font-family: "Roboto", "Arial", sans-serif;
            background-color: #0f0f0f; /* YouTubeの背景色 */
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ヘッダー */
        .header {
            padding: 10px 15px;
            background: #0f0f0f;
            border-bottom: 1px solid #2f2f2f;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .back-btn {
            color: #aaa;
            text-decoration: none;
            font-size: 1.2rem;
            padding: 5px;
        }
        h2 { font-size: 1rem; margin: 0; flex-grow: 1; text-align: center; color: #fff; }

        /* チャット表示エリア */
        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 5px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* メッセージ一行のスタイル */
        .message-container {
            display: flex;
            align-items: flex-start;
            padding: 4px 10px;
            transition: background 0.2s;
        }
        .message-container:hover { background: rgba(255,255,255,0.05); }

        .avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            margin-right: 12px;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .content { display: flex; flex-wrap: wrap; align-items: baseline; }
        .user-name {
            font-weight: bold;
            color: #aaa; /* YouTube風の控えめな色 */
            font-size: 0.85rem;
            margin-right: 8px;
        }
        .text {
            color: #efefef;
            font-size: 0.85rem;
            word-break: break-word;
            line-height: 1.4;
        }

        /* フッター入力エリア */
        .input-area {
            background: #0f0f0f;
            padding: 10px 15px;
            border-top: 1px solid #2f2f2f;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); /* iPhoneのバー対策 */
        }

        .input-wrapper {
            flex-grow: 1;
            background: #272727;
            border-radius: 20px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
        }

        input {
            background: transparent;
            border: none;
            color: white;
            flex-grow: 1;
            padding: 8px 0;
            outline: none;
            font-size: 16px;
        }

        .send-btn {
            background: transparent;
            border: none;
            color: #3ea6ff; /* YouTubeのリンク/ボタン色 */
            font-weight: bold;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 0.9rem;
        }
        .send-btn:disabled { color: #555; }

        /* スクロールバーのカスタマイズ */
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn">✕</a>
    <h2 id="room-title">チャット</h2>
    <div style="width: 30px;"></div> </div>

<div id="chat-box"></div>

<div class="input-area">
    <div class="input-wrapper">
        <input type="text" id="name" placeholder="名前" style="width: 60px; border-right: 1px solid #444; margin-right: 10px; padding-right: 5px;">
        <input type="text" id="message" placeholder="チャットを入力..." onkeydown="handleKeyPress(event)">
    </div>
    <button class="send-btn" id="send-btn" onclick="send()">送信</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script>
    var stompClient = null;
    const urlParams = new URLSearchParams(window.location.search);
    const gameId = urlParams.get('gameId');
    const gameDateStr = urlParams.get('date');

    document.getElementById('room-title').innerText = gameId ? gameId.split('-').slice(0, 2).join(' vs ') : "ライブチャット";

    function connect() {
        var socket = new SockJS('/chat-websocket');
        stompClient = Stomp.over(socket);
        stompClient.debug = null; // コンソールのログを非表示にして動作を軽くする
        stompClient.connect({}, function (frame) {
            stompClient.subscribe('/topic/messages/' + gameId, function (response) {
                showChat(response.body);
            });
        });
    }

    function checkAccess() {
        if (!gameDateStr) return true;
        const now = new Date();
        const [year, month, day] = gameDateStr.split('-').map(Number);
        const openTime = new Date(year, month - 1, day, 10, 0, 0);
        const closeTime = new Date(year, month - 1, day + 1, 4, 0, 0);

        if (now < openTime || now > closeTime) {
            alert("この試合のチャットは、試合当日10:00から翌日4:00まで利用可能です。");
            location.href = 'index.html';
            return false;
        }
        return true;
    }

    function handleKeyPress(event) { if (event.key === 'Enter') send(); }

    function send() {
        var nameInput = document.getElementById('name');
        var name = nameInput.value || "匿名";
        var msgInput = document.getElementById('message');
        var msg = msgInput.value;
        if (!msg) return;

        stompClient.send("/app/send/" + gameId, {}, name + ": " + msg);
        msgInput.value = '';
    }

    function showChat(message) {
        var chatBox = document.getElementById('chat-box');
        var parts = message.split(': ');
        var name = parts[0];
        var text = parts.slice(1).join(': ');

        var container = document.createElement('div');
        container.className = 'message-container';

        var iconUrl = "https://ui-avatars.com/api/?name=" + encodeURIComponent(name) + "&background=random&color=fff&size=32";

        container.innerHTML = `
            <img src="${iconUrl}" class="avatar">
            <div class="content">
                <span class="user-name">${name}</span>
                <span class="text">${text}</span>
            </div>
        `;
        chatBox.appendChild(container);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    window.onload = () => {
        if (checkAccess()) {
            connect();
        }
    };
</script>
</body>
</html>
