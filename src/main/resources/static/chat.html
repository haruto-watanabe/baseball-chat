<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>野球談義 - ライブチャット</title>
    <style>
        /* --- 基本スタイル（スマホ：ダークモード） --- */
        body {
            font-family: "Roboto", "Arial", sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s;
        }

        .header {
            padding: 10px 15px;
            background: #0f0f0f;
            border-bottom: 1px solid #2f2f2f;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .back-btn { color: #aaa; text-decoration: none; font-size: 1.2rem; padding: 5px; }
        h2 { font-size: 1rem; margin: 0; flex-grow: 1; text-align: center; color: #fff; }

        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 5px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message-container { display: flex; align-items: flex-start; padding: 4px 10px; }
        .avatar { width: 24px; height: 24px; border-radius: 50%; margin-right: 12px; flex-shrink: 0; }
        .content { display: flex; flex-wrap: wrap; align-items: baseline; }
        .user-name { font-weight: bold; color: #aaa; font-size: 0.85rem; margin-right: 8px; }
        .text { color: #efefef; font-size: 0.85rem; word-break: break-word; line-height: 1.4; }

        .input-area {
            background: #0f0f0f;
            padding: 10px 15px;
            border-top: 1px solid #2f2f2f;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-wrapper {
            flex-grow: 1;
            background: #272727;
            border-radius: 20px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
        }

        input {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 0;
            outline: none;
            font-size: 16px;
        }

        .send-btn {
            background: transparent;
            border: none;
            color: #3ea6ff;
            font-weight: bold;
            cursor: pointer;
            padding: 5px 10px;
        }

        /* --- PC向けスタイル（画面幅 769px 以上） --- */
        @media (min-width: 769px) {
            body { background-color: #ffffff; color: #333; }
            .header { background: #ffffff; border-bottom: 1px solid #ddd; }
            h2 { color: #333; }
            .back-btn { color: #333; }

            /* メッセージの色調整 */
            .user-name { color: #555; }
            .text { color: #000; }
            .message-container:hover { background: rgba(0,0,0,0.02); }

            /* 入力エリア（白基調 & 2:7 比率） */
            .input-area { background: #ffffff; border-top: 1px solid #ddd; }
            .input-wrapper {
                background: #f1f1f1;
                border: 1px solid #ccc;
                border-radius: 10px; /* PCは少しカッチリめ */
            }
            input { color: #333; }

            /* ここで 2:7 の比率を指定 */
            #name {
                flex: 2 !important; /* 全体の2/9 */
                width: auto !important;
                border-right: 1px solid #ccc !important;
                margin-right: 10px;
            }
            #message {
                flex: 7 !important; /* 全体の7/9 */
            }

            .send-btn { color: #065fd4; }

            /* スクロールバーを見やすく */
            #chat-box::-webkit-scrollbar-thumb { background: #ccc; }
        }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn">✕</a>
    <h2 id="room-title">チャット</h2>
    <div style="width: 30px;"></div>
</div>

<div id="chat-box"></div>

<div class="input-area">
    <div class="input-wrapper">
        <!-- 比率指定のため style="width: 60px" を削除し、CSS側で制御 -->
        <input type="text" id="name" placeholder="名前">
        <input type="text" id="message" placeholder="チャットを入力..." onkeydown="handleKeyPress(event)">
    </div>
    <button class="send-btn" id="send-btn" onclick="send()">送信</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script>
    var stompClient = null;
    const urlParams = new URLSearchParams(window.location.search);
    const gameId = urlParams.get('gameId');
    const gameDateStr = urlParams.get('date');

    document.getElementById('room-title').innerText = gameId ? gameId.split('-').slice(0, 2).join(' vs ') : "ライブチャット";

    function connect() {
        var socket = new SockJS('/chat-websocket');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;
        stompClient.connect({}, function (frame) {
            stompClient.subscribe('/topic/messages/' + gameId, function (response) {
                showChat(response.body);
            });
        });
    }

    function checkAccess() {
        if (!gameDateStr) return true;
        const now = new Date();
        const [year, month, day] = gameDateStr.split('-').map(Number);
        const openTime = new Date(year, month - 1, day, 10, 0, 0);
        const closeTime = new Date(year, month - 1, day + 1, 4, 0, 0);

        if (now < openTime || now > closeTime) {
            alert("この試合のチャットは、試合当日10:00から翌日4:00まで利用可能です。");
            location.href = 'index.html';
            return false;
        }
        return true;
    }

    function handleKeyPress(event) { if (event.key === 'Enter') send(); }

    function send() {
        var nameInput = document.getElementById('name');
        var name = nameInput.value || "匿名";
        var msgInput = document.getElementById('message');
        var msg = msgInput.value;
        if (!msg) return;

        stompClient.send("/app/send/" + gameId, {}, name + ": " + msg);
        msgInput.value = '';
    }

    function showChat(message) {
        var chatBox = document.getElementById('chat-box');
        var parts = message.split(': ');
        var name = parts[0];
        var text = parts.slice(1).join(': ');

        var container = document.createElement('div');
        container.className = 'message-container';

        var iconUrl = "https://ui-avatars.com/api/?name=" + encodeURIComponent(name) + "&background=random&color=fff&size=32";

        container.innerHTML = `
            <img src="${iconUrl}" class="avatar">
            <div class="content">
                <span class="user-name">${name}</span>
                <span class="text">${text}</span>
            </div>
        `;
        chatBox.appendChild(container);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    window.onload = () => {
        if (checkAccess()) {
            connect();
        }
    };
</script>
</body>
</html>
