<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NPB Game Hub</title>
    <style>
        /* 前回のスタイルを継承しつつ追加 */
        .header-actions { display: flex; justify-content: space-between; align-items: center; }
        .calendar-btn { background: none; border: 1px solid #ccc; padding: 8px; border-radius: 5px; cursor: pointer; font-size: 1.2rem; }

        /* 簡易カレンダーモーダルのスタイル */
        #calendar-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.3); z-index: 100; }
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:90; }

        input[type="date"] { padding: 10px; font-size: 1rem; border-radius: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body>
<div class="container">
    <header class="header-actions">
        <h1>NPB Game Hub <span id="display-date">2026.05.02</span></h1>
        <button class="calendar-btn" onclick="toggleCalendar()">📅 日付選択</button>
    </header>

    <div id="game-list" class="game-grid">
        <!-- ここに試合カードが動的に挿入される -->
    </div>
</div>

<!-- カレンダーモーダル -->
<div class="modal-overlay" id="overlay" onclick="toggleCalendar()"></div>
<div id="calendar-modal">
    <h3>試合日を選択</h3>
    <input type="date" id="date-picker" value="2026-05-02" onchange="loadGames(this.value)">
    <button onclick="toggleCalendar()" style="margin-top: 10px; width: 100%;">閉じる</button>
</div>

<script>
    function toggleCalendar() {
        const modal = document.getElementById('calendar-modal');
        const overlay = document.getElementById('overlay');
        const isVisible = modal.style.display === 'block';
        modal.style.display = isVisible ? 'none' : 'block';
        overlay.style.display = isVisible ? 'none' : 'block';
    }

    async function loadGames(date) {
        const response = await fetch(`/api/games?date=${date}`);
        const games = await response.json();

        document.getElementById('display-date').innerText = date.replace(/-/g, '.');
        const container = document.getElementById('game-list');
        container.innerHTML = ''; // 一旦クリア

        if (games.length === 0) {
            container.innerHTML = '<p>この日の試合予定はありません。</p>';
            return;
        }

        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `
                    <div class="live-badge">${game.status}</div>
                    <div style="color: #666;">${game.venue} (${game.startTime})</div>
                    <div class="teams">
                        <span>${game.awayTeam}</span> <span>vs</span> <span>${game.homeTeam}</span>
                    </div>
                    <button class="join-btn" onclick="location.href='chat.html?gameId=${game.id}'">チャットに参加</button>
                `;
            container.appendChild(card);
        });

        if (document.getElementById('calendar-modal').style.display === 'block') toggleCalendar();
    }

    // 初回読み込み
    window.onload = () => loadGames('2026-05-02');
</script>
</body>
</html>
